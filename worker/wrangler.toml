name = "image-background-remover-worker"
compatibility_date = "2024-01-01"
main = "src/index.ts"

# Route configuration - adjust this to match your Cloudflare Pages custom domain
# For example, if your site is at removebg.yourdomain.com, use:
# routes = [{ pattern = "removebg.yourdomain.com/api/*", zone_name = "yourdomain.com" }]

# Environment variables (set these in Cloudflare dashboard or via CLI)
# wrangler secret put REMOVE_BG_API_KEY

[vars]
# Default empty - must be set via wrangler secret put REMOVE_BG_API_KEY
# Or set in Cloudflare Workers Dashboard > Settings > Variables

# CORS configuration (handled in code, but these are the allowed origins)
# Uncomment and modify if you need to restrict CORS to specific domains
# ALLOWED_ORIGIN = "https://your-domain.com"
